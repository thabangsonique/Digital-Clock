<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <script src="script.js " defer></script>
    <title>Digital Clock App</title>
  </head>
  <body>
    <!-- THEME TOGGLE BUTTON -->
    <button id="theme-switch">
      <img
        src="./Icons/moon-solid.png"
        style="height: 30px; width: 30px"
        alt="moon icon"
      />
      <img
        src="./Icons/sun-regular.png"
        alt="sun icon"
        style="height: 30px; width: 30px"
      />
    </button>
    <main class="clock-hero">
      <h1>Digital Clock</h1>

      <!-- clock container -->
      <div class="clock-container shadow">
        <!-- date -->
        <h3 id="date">friday 5 May 2026</h3>
        <div class="clock">
          <span id="hours">00</span>
          <span>:</span>
          <span id="minutes">00</span>
          <span>:</span>
          <span id="seconds">00</span>
          <span id="session">AM</span>
        </div>
      </div>
    </main>
  </body>
</html>
